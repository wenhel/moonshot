# @package labeler
# Assembly Video Labeler - Structured variant with spatial location tracking
# Outputs: Description (with movement tracking) + Tools (origin location) + Parts (origin location)

labeler_info:
  name: "assembly_structured-with-instruction"
  class_name: "AssemblyVideoLabeler"
  base_class: "OpenRouterLabeler"
  description: "Assembly video structured labeling with origin locations and movement tracking"

model_config_ref: "model/openrouter.yaml"

task_config:
  task_type: "assembly_video_structured_located"
  instruction_type: "assembly_structured_with_instruction"
  input_requirements:
    requires_text: false
    supports_images: true
    max_images: 10
  output_format: "free_text"

generation_config:
  temperature: 0.2
  max_tokens: 800

instructions:
  assembly_structured_with_instruction:
    template: |
      These are keyframes from a hardware assembly video segment ({time_range}).{transcript_hint}

      Use the following spatial grid to describe WHERE items appear in each keyframe.
      Divide the image (1920x1080) into a 3x3 grid:

      ```
       top-left    | top-center    | top-right
       mid-left    | mid-center    | mid-right
       bottom-left | bottom-center | bottom-right
      ```

      IMPORTANT: This video has a FIXED layout. Items have ORIGIN (starting) positions:
      - top-left: carbon fiber frame pieces (arms, plates, braces)
      - top-right: whiteboard showing screw types (M3x16mm socket head, M3x22mm pan head, M3x6mm pan head, M3x16mm pan head)
      - mid-left: purple standoffs, small screws
      - bottom-center: hex screwdrivers (gold 2.5mm, black 2.0mm, blue 1.5mm, silver)
      - mid-center to mid-right: main assembly work area

      When reporting locations for Tools and Parts, always use the ORIGIN position (where they started on the table), NOT where they are currently being held or used.

      Analyze the keyframes and provide THREE clearly separated sections:

      **Description**: In 2-3 sentences describe the assembly action being performed. When a tool or part is picked up and moved, track the movement using this format:
        [TOOL: name @ origin-location -> current-location]
        [PART: name @ origin-location -> current-location]
      Example: "The person picks up [TOOL: hex screwdriver 2.0mm @ bottom-center -> mid-center] and uses it to tighten [PART: M3 x 16mm socket head screw @ top-right -> mid-center] into the frame arm."

      **Tools**: List every tool and consumable supply the person is ACTIVELY USING. Use ORIGIN location only.
      Format: [TOOL: name @ origin-location]. If none visible, write [TOOL: none].
      Examples:
        [TOOL: hex screwdriver 2.0mm @ bottom-center]
        [SUPPLY: blue Loctite @ mid-right]

      **Parts**: List every component or part being assembled, handled, or referenced. Use ORIGIN location only.
      Format: [PART: name @ origin-location]. If none visible, write [PART: none].
      Examples:
        [PART: carbon fiber frame arm @ top-left]
        [PART: M3 x 16mm socket head screw @ top-right]
        [PART: purple standoff @ mid-left]
